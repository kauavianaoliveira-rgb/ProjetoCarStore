<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarStore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="cabecalho">
        <h3>Cadastre seu veiculo para vender mais rapido</h3>
    </header>
    <div class="form-container">
        <div class="form-header">
            <p>Formulário</p>
        </div>

        <div class="form-body">
            <h1>Venda fácil seu carro</h1>
            <p>Descreva as caracteristicas dos seu carro e marque os opcionais que ele possui</p>
            <form onsubmit="salvarCarros(event)">
                <div class="ciaxaInpus">
                    <label for="title">Titulo do Anuncio <span class="campo-obrigatorio">*</span></label>
                    <input type="text" name="title" id="title" class="block" placeholder="Um titulo para anunciar seu carro">
                </div>

                <div class="ciaxaInpus">
                    <label for="preco">Preço <span class="campo-obrigatorio">*</span></label>
                    <input type="number" name="Preco" id="preco" class="block" placeholder="Defina o Preço">
                </div>

                <div class="ciaxaInpus">
                    <label for="descricao">Descrição <span class="campo-obrigatorio">*</span></label>
                    <textarea name="descricao" id="descricao" class="block"></textarea>
                </div>

                <div class="ciaxaInpus">
                    <label for="marca">Marca <span class="campo-obrigatorio">*</span></label>
                    <input type="text" name="Marca" id="Marca" class="block" placeholder="Coloque a marca de seu veiculo">
                </div>

                 <div class="ciaxaInpus">
                    <label for="modelo">Modelo <span class="campo-obrigatorio">*</span></label>
                    <input type="text" name="Modelo" id="Modelo" class="block" placeholder="Defina o modelo de seu veiculo">
                </div>

                <div class="ciaxaInpus">
                    <label for="quilometragem">quilometragem <span class="campo-obrigatorio">*</span></label>
                    <input number="text" name="quilometragem" id="quilometragem" class="block" placeholder="Quilometragem do seu carro">
                </div>

                <div class="ciaxaInpus">
                    <label for="dataDeCompra">Data de compra <span class="campo-obrigatorio">*</span></label>
                    <input number="text" name="dataDeCompra" id="dataDeCompra" class="block"  placeholder="Data que seu veiculo foi comprado">
                </div>

                 <div class="ciaxaInpus">
                   <p>Tipo de Câmbio: <span class="campo-obrigatorio">*</span></p>
                    <input type="radio" name="marcha" id="manual" class="block" >
                    <label for="manual">manual</label>
                     <input type="radio" name="marcha" id="auto">
                    <label for="manual">automatico</label>
                </div>

                <div>
                    <p>Opicionais</p>
                    <ul>
                        <li>
                            <input type="checkbox" name="opcional[]" id="airbag" class="block" value="airbag">
                            <label for="airbag">Airbag</label>
                        </li>
                        <li> 
                            <input type="checkbox" name="opcional[]" id="alarme" class="block"  value="alarme">
                            <label for="alarme">Alarme</label>
                        </li>
                        <li> 
                            <input type="checkbox" name="opcional[]" id="arcondicionado" class="block"  value="arcondicionado">
                            <label for="arcondicionado">Ar condicionado</label>
                        </li>
                        <li> 
                            <input type="checkbox" name="opcional[]" id="cameraderé" class="block" value="cameraderé">
                            <label for="cameraderé">Camera de ré</label>
                        </li>
                    </ul>
                </div>

                 <div class="caixaOpcional">
                    <ul class="listaOpcionais">
                        <li>
                            <input type="checkbox" name="opcional[]" id="assistentePista" value="assistentePista">
                            <label for="assistentePista">Assistente Pista</label>
                        </li>
                        <li> 
                            <input type="checkbox" name="opcional[]" id="partidaSemChave" value="partidaSemChave">
                            <label for="partidaSemChave">Partida Sem Chave</label>
                        </li>
                        <li> 
                            <input type="checkbox" name="opcional[]" id="integraçãoCelular" value="integraçãoCelular">
                            <label for="integraçãoCelular">Integração com Celular</label>
                        </li>
                        <li> 
                            <input type="checkbox" name="opcional[]" id="bancoDeCouro" value="bancoDeCouro">
                            <label for="bancoDeCouro">Banco de Couro</label>
                        </li>
                    </ul>
                </div>
                <div class="caixaOpcional">
                    <p>Fotos do carro <span class="campo-obrigatorio">*</span></p>
                    <input type="file" name="imagem" id="imagem" multiple accept="image/png, image/jpg">
                </div>
                <input type="submit" value="Envia"
                class="btn-submit">
            </form>
            <hr>
            <h2>Carros Cadastrados</h2>
            <div></div>
        </div>
    </div>
    <script src="script/script.js"></script>
</body>
</html>
