<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Store</title>
</head>
<body>
    <header>
        <h3>Cadastre seu veívulo para vender mais rápido</h3>
    </header>
    <div>
        <div>
            <p>Formulário</p>
        </div>

        <div>
            <h1>Venda fácil seu carro</h1>
            <p>Descreva as características do seu carro e marque os opcionais que ele possui</p>
            <form>
                <div>
                    <label for="title">Título do Anúncio <span>*</span></label>
                    <input type="text" name="title" id="title" placeholder="Um título para anunciar seu carro">
                </div>

                <div>
                    <label for="preco">Preço <span>*</span></label>
                    <input type="number" name="preco" id="preco" placeholder="Defina o preço">
                </div>

                <div>
                    <label for="descricao">Descrição <span>*</span></label>
                    <textarea name="descricao" id="descricao" placeholder="Faça a descrição do seu veículo"></textarea>
                </div>

                <div>
                    <label for="marca">Marca <span>*</span></label>
                    <input type="text" name="marca" id="marca" placeholder="Marca do veículo">
                </div>

                <div>
                    <label for="modelo">Modelo <span>*</span></label>
                    <input type="text" name="modelo" id="modelo" placeholder="Modelo do veículo">
                </div>
                
                <div>
                    <label for="kilometragem">Kilometragem <span>*</span></label>
                    <input type="number" name="kilometragem" id="kilometragem" placeholder="Kilometragem">
                </div>
                
                <div>
                    <label for="data-de-compra">Data de compra <span>*</span></label>
                    <input type="date" name="data-de-compra" id="data-de-compra" placeholder="Data de compra">
                </div>

                <div>
                    <p>Tipo de câmbio:</p>
                    <input type="radio" name="marcha" id="manual">
                    <label for="manual">Manual</label>
                    <input type="radio" name="marcha" id="auto">
                    <label for="auto">Automático</label>
                </div>

                <div>
                    <p>Opcionais</p>
                    <ul>
                        <li>
                            <input type="checkbox" name="opcional[]" id="airbag" value="airbag">
                            <label for="airbag">Airbag</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opcional[]" id="ar-condicionado" value="ar-condicionado">
                            <label for="ar-condicionado">Ar condicionado</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opcional[]" id="alarme" value="alarme">
                            <label for="alarme">Alarme</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opcional[]" id="camera-de-re" value="camera-de-re">
                            <label for="camera-de-re">Câmera de ré</label>
                        </li>
                    </ul>
                </div>
                <div>
                    <ul>
                        <li>
                            <input type="checkbox" name="opcional[]" id="assistente-de-pisca" value="assistente-de-pisca">
                            <label for="assistente-de-pisca">Assistente de pisca</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opcional[]" id="partida-sem-chave" value="partida-sem-chave">
                            <label for="partida-sem-chave">Partida sem chave</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opcional[]" id="integracao-com-celular" value="integracao-com-celular">
                            <label for="integracao-com-celular">Integração com celular</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opcional[]" id="banco-de-couro" value="banco-de-couro">
                            <label for="banco-de-couro">Banco de couro</label>
                        </li>
                    </ul>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
